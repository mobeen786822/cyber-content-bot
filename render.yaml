services:
  - type: web
    name: cyber-content-bot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_HOST
        value: "0.0.0.0"
      - key: CONTENT_BOT_REQUIRE_AUTH
        value: "true"
      - key: CONTENT_BOT_API_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: web
    name: cyber-content-bot-ui
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_BASE
        sync: false
